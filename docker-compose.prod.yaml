services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ${STACK_NAME}-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend-internal

  redis:
    image: redis:7-alpine
    container_name: ${STACK_NAME}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-internal

  migrations:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}/backend:${DOCKER_TAG}
    container_name: ${STACK_NAME}-migrations
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: uv run alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-internal

  backend:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}/backend:${DOCKER_TAG}
    container_name: ${STACK_NAME}-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - backend-internal

  celery-worker:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}/backend:${DOCKER_TAG}
    container_name: ${STACK_NAME}-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: uv run celery -A app.tasks.celery_app worker --pool=prefork --concurrency=${CELERY_CONCURRENCY:-2} --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - backend-internal

  frontend:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}/frontend:${DOCKER_TAG}
    container_name: ${STACK_NAME}-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    command: npm run dev -- --host 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - frontend-internal

  nginx:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}/nginx:${DOCKER_TAG}
    container_name: ${STACK_NAME}-nginx
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME}-nginx.loadbalancer.server.port=80
      - traefik.http.routers.${STACK_NAME}-nginx-http.rule=Host(`ppa.${DOMAIN}`)
      - traefik.http.routers.${STACK_NAME}-nginx-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME}-nginx-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME}-nginx-https.rule=Host(`ppa.${DOMAIN}`)
      - traefik.http.routers.${STACK_NAME}-nginx-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME}-nginx-https.tls=true
      - traefik.http.routers.${STACK_NAME}-nginx-https.tls.certresolver=le
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - traefik-public
      - backend-internal
      - frontend-internal

volumes:
  postgres_data:
  redis_data:

networks:
  traefik-public:
    external: true
  backend-internal:
    driver: bridge
  frontend-internal:
    driver: bridge
